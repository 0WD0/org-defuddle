name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without a leading v, for example 0.1.1"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  DEFUDDLE_UPSTREAM_COMMIT: 19520add09282abdfadbc6d23eb6bf8393af2bf8

jobs:
  prepare:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_ref: ${{ steps.commit.outputs.release_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: purcell/setup-emacs@master
        with:
          version: 30.2

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like 0.1.1 without a leading v" >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update version files
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/;; Version: [0-9]+\.[0-9]+\.[0-9]+/;; Version: $ENV{VERSION}/' org-defuddle.el
          perl -0pi -e 's/\(defconst org-defuddle--module-version "v[0-9]+\.[0-9]+\.[0-9]+"/(defconst org-defuddle--module-version "v$ENV{VERSION}"/' org-defuddle.el
          for manifest in crates/org-defuddle-core/Cargo.toml crates/org-defuddle-cli/Cargo.toml crates/org-defuddle-module/Cargo.toml; do
            perl -0pi -e 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"$/version = "$ENV{VERSION}"/m' "${manifest}"
          done
          cargo check --workspace

      - name: Check out upstream fixtures
        run: |
          git init /private/tmp/defuddle-elisp-source
          git -C /private/tmp/defuddle-elisp-source remote add origin https://github.com/kepano/defuddle.git
          git -C /private/tmp/defuddle-elisp-source fetch --depth 1 origin "${DEFUDDLE_UPSTREAM_COMMIT}"
          git -C /private/tmp/defuddle-elisp-source checkout --detach FETCH_HEAD
          npm --prefix /private/tmp/defuddle-elisp-source ci
          npm --prefix /private/tmp/defuddle-elisp-source run build:node

      - name: Verify release
        env:
          ORG_DEFUDDLE_DEFUDDLE_DIR: /private/tmp/defuddle-elisp-source
        run: |
          set -euo pipefail
          rustup toolchain install 1.80.0 --profile minimal
          cargo +1.80.0 check --workspace --locked
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo test -p org-defuddle-core --test upstream_fixtures --locked \
            all_upstream_fixture_content_matches_exact_org_rendering \
            -- --ignored
          cargo build --release -p org-defuddle-module --locked
          cargo build --release -p org-defuddle-cli --locked
          emacs -Q --batch -L . -L test \
            -l test/org-defuddle-test.el \
            -f ert-run-tests-batch-and-exit
          emacs -Q --batch --eval '(byte-compile-file "org-defuddle.el")'

      - name: Commit release version
        id: commit
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add org-defuddle.el Cargo.lock crates/*/Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "Release ${TAG}"
            git push origin HEAD:main
          fi
          echo "release_ref=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            module_lib: liborg_defuddle_module.dylib
            module_asset: liborg-defuddle-aarch64-apple-darwin.dylib
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            module_lib: liborg_defuddle_module.dylib
            module_asset: liborg-defuddle-x86_64-apple-darwin.dylib
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            module_lib: liborg_defuddle_module.so
            module_asset: liborg-defuddle-x86_64-unknown-linux-gnu.so
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            module_lib: liborg_defuddle_module.so
            module_asset: liborg-defuddle-aarch64-unknown-linux-gnu.so
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            module_lib: org_defuddle_module.dll
            module_asset: liborg-defuddle-x86_64-pc-windows-msvc.dll
            cli_bin: org-defuddle.exe
            cli_asset: org-defuddle-cli-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os != 'Linux'
        with:
          targets: ${{ matrix.target }}

      - name: Build macOS or Windows release assets
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p org-defuddle-module -p org-defuddle-cli --locked

      - name: Build Linux release assets on Ubuntu 20.04
        if: runner.os == 'Linux'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            --env TARGET \
            --volume "${GITHUB_WORKSPACE}:/work" \
            --workdir /work \
            ubuntu:20.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends build-essential ca-certificates curl
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain 1.80.0
              . "${HOME}/.cargo/env"
              cargo build --release --target "${TARGET}" \
                -p org-defuddle-module -p org-defuddle-cli --locked
            '

      - name: Rename release assets
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.module_lib }}" "${{ matrix.module_asset }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.cli_bin }}" "${{ matrix.cli_asset }}"

      - uses: purcell/setup-emacs@master
        if: runner.os == 'Linux'
        with:
          version: 30.2

      - name: Verify Linux module through Emacs
        if: runner.os == 'Linux'
        shell: bash
        env:
          MODULE_ASSET: ${{ matrix.module_asset }}
        run: |
          emacs -Q --batch -L . --eval '
            (progn
              (require (quote org-defuddle))
              (setq org-defuddle-module-file (expand-file-name (getenv "MODULE_ASSET"))
                    org-defuddle--module-loaded nil)
              (org-defuddle-load-module)
              (unless (string-match-p
                       "Linux release module works"
                       (org-defuddle-html-to-org
                        "<article><p>Linux release module works.</p></article>"
                        "https://example.com/module-smoke"))
                (error "Linux release module smoke test failed")))'

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: org-defuddle-${{ matrix.target }}
          path: |
            ${{ matrix.module_asset }}
            ${{ matrix.cli_asset }}

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create release tag
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            existing="$(git rev-list -n 1 "refs/tags/${TAG}")"
            expected="$(git rev-parse "${RELEASE_REF}")"
            if [[ "${existing}" == "${expected}" ]]; then
              echo "Tag ${TAG} already points at ${expected}; reusing it"
              exit 0
            fi
            echo "Tag ${TAG} already exists at ${existing}, expected ${expected}" >&2
            exit 1
          fi
          git tag -a "${TAG}" "${RELEASE_REF}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
